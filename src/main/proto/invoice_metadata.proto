syntax = "proto3";

package rechnung.invoice.v1;

option java_multiple_files = true;
option java_package = "com.acme.rechnung.invoice.v1";
option java_outer_classname = "InvoiceMetadataProto";

service InvoiceMetadataService {
  rpc SaveInvoiceMetadata(SaveInvoiceMetadataRequest) returns (SaveInvoiceMetadataResponse);
}

message Rechnungsdaten {
  string rechnungs_id = 1;
  string lieferanten_name = 2;
  string rechnungs_nummer = 3;
  string rechnungs_datum = 4;
  string gesamtbetrag_brutto = 5;
  string waehrung = 6;
}

message SaveInvoiceMetadataRequest {
  Rechnungsdaten metadata = 1;
}

message SaveInvoiceMetadataResponse {
  Rechnungsdaten metadata = 1;
  string status = 2;
}
