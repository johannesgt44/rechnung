/* Selbstgecoded, Überarbeitung mit KI */
syntax = "proto3";

package rechnung.invoice.v1;

option java_multiple_files = true;
option java_package = "com.acme.rechnung.invoice.v1";
option java_outer_classname = "RechnungMetadataProto";

// Vertrag für den Austausch von Rechnungsmetadaten per gRPC.

service RechnungMetadataService {
  rpc CreateRechnungMetadata(CreateRechnungMetadataRequest) returns (CreateRechnungMetadataResponse);
  rpc GetRechnungMetadata(GetRechnungMetadataRequest) returns (GetRechnungMetadataResponse);
}

message Rechnungsdaten {
  string lieferanten_name = 1;
  string rechnungs_nummer = 2;
  string rechnungs_datum = 3;
  string gesamtbetrag_brutto = 4;
  string waehrung = 5;
  string lieferanten_nummer = 6;
  string zahlungsziel = 7;
  string bemerkungen = 8;
  repeated Rechnungsposten rechnungsposten = 9;
}

message Rechnungsposten {
  int32 position = 1;
  string beschreibung = 2;
  string menge = 3;
  string einheit = 4;
  string einzelpreis_brutto = 5;
  string steuer_prozent = 6;
}

message CreateRechnungMetadataRequest {
  Rechnungsdaten metadata = 1;
}

message CreateRechnungMetadataResponse {
  Rechnungsdaten metadata = 1;
  string status = 2;
}

message GetRechnungMetadataRequest {
  string rechnungs_nummer = 1;
}

message GetRechnungMetadataResponse {
  Rechnungsdaten metadata = 1;
}
